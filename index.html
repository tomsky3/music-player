<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱玩社区主题曲库</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 腾讯云 COS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        <!-- 页面头部 -->
        <header class="header">
            <div class="header-content">
                <div class="header-text">
                    <h1 class="header-title">爱玩社区主题曲库</h1>
                    <p class="header-subtitle">Personal Music Collection</p>
                </div>
                <div class="upload-buttons">
                    <button class="upload-btn theme-btn" id="uploadThemeSong">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                        主题曲投稿
                    </button>
                    <button class="upload-btn other-btn" id="uploadOther">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
                        </svg>
                        其它歌单
                    </button>
                </div>
            </div>
        </header>

        <!-- 歌曲列表区域 -->
        <main class="songs-container">
            <!-- 主题曲区域 -->
            <section class="songs-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                        主题曲投稿
                    </h2>
                    <span class="section-count" id="themeCount">0 首</span>
                </div>
                <div class="songs-grid" id="themeSongsGrid">
                    <!-- 主题曲卡片将通过JavaScript动态生成 -->
                </div>
            </section>

            <!-- 其它歌单区域 -->
            <section class="songs-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                            <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
                        </svg>
                        其它歌单
                    </h2>
                    <span class="section-count" id="otherCount">0 首</span>
                </div>
                <div class="songs-grid" id="otherSongsGrid">
                    <!-- 其它歌单卡片将通过JavaScript动态生成 -->
                </div>
            </section>
        </main>
    </div>

    <!-- 上传弹窗 -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h2>上传新歌曲</h2>
                <button class="modal-close" id="closeUploadBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            
            <div class="modal-body">
                <form id="uploadForm">
                    <!-- 音频文件 -->
                    <div class="form-group">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                            音频文件 <span class="required">*</span>
                        </label>
                        <div class="file-input-wrapper">
                            <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,.m4a,.flac" required>
                            <div class="file-input-display" id="audioFileDisplay">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                                </svg>
                                <span>点击选择音频文件</span>
                                <small>支持 MP3, WAV, OGG, M4A, FLAC (最大 20MB)</small>
                            </div>
                        </div>
                    </div>

                    <!-- 封面图片 -->
                    <div class="form-group">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                            </svg>
                            封面图片（可选）
                        </label>
                        <div class="file-input-wrapper">
                            <input type="file" id="coverFile" accept=".jpg,.jpeg,.png,.webp">
                            <div class="file-input-display" id="coverFileDisplay">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                                </svg>
                                <span>点击选择封面图片</span>
                                <small>支持 JPG, PNG, WEBP (最大 5MB)</small>
                            </div>
                        </div>
                    </div>

                    <!-- 歌曲信息 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                </svg>
                                歌曲标题
                            </label>
                            <input type="text" id="songTitle" class="form-input" placeholder="输入歌曲标题">
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                </svg>
                                艺术家
                            </label>
                            <input type="text" id="songArtist" class="form-input" placeholder="输入艺术家名称">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/>
                            </svg>
                            专辑名称
                        </label>
                        <input type="text" id="songAlbum" class="form-input" placeholder="输入专辑名称">
                    </div>

                    <!-- 上传进度 -->
                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-header">
                            <span id="progressStage">准备上传...</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="uploadProgressBar"></div>
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelUploadBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="submitUploadBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
                            </svg>
                            开始上传
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 底部固定播放栏 -->
    <div class="player-bar" id="playerBar">
        <div class="player-content">
            <!-- 封面区域 -->
            <div class="player-cover">
                <img id="currentCover" src="https://placehold.co/80x80/1a1a2e/1DB954?text=♪" alt="当前播放封面" onerror="this.src='https://placehold.co/80x80/1a1a2e/1DB954?text=♪'">
            </div>

            <!-- 播放信息和控制 -->
            <div class="player-info">
                <div class="song-details">
                    <h3 id="currentTitle" class="song-title">选择一首歌曲开始播放</h3>
                    <p id="currentArtist" class="song-artist">--</p>
                </div>

                <!-- 播放控制按钮 -->
                <div class="player-controls">
                    <button class="control-btn" id="prevBtn" title="上一首">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="control-btn play-btn" id="playBtn" title="播放/暂停">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button class="control-btn" id="nextBtn" title="下一首">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>

                <!-- 进度条 -->
                <div class="progress-container">
                    <span class="time-label" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                    <span class="time-label" id="totalTime">0:00</span>
                </div>
            </div>

            <!-- 音量控制 -->
            <div class="volume-control">
                <button class="volume-btn" id="volumeBtn" title="音量">
                    <svg class="volume-high" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg class="volume-muted" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <div class="volume-slider-container">
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </div>
    </div>

    <!-- 配置和模块 -->
    <script src="js/config.js"></script>
    <script src="js/likes.js"></script>
    <script src="js/songs-manager.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
